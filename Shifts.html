<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排班系統</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --gray: #6c757d; }
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; background: #f8f9fa; }
    .container { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .hidden { display: none; }
    
    /* 導覽列 */
    nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: white; border-top: 1px solid #ddd; z-index: 100; }
    nav button { flex: 1; padding: 15px; border: none; background: none; font-size: 14px; color: var(--gray); }
    nav button.active { color: var(--primary); font-weight: bold; }

    /* 日曆卡片 */
    .calendar-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
    .card { display: flex; align-items: center; justify-content: space-between; padding: 12px; border: 1px solid #eee; border-radius: 8px; }
    .card.selected { border-color: var(--primary); background: #e7f1ff; }
    .card.mine { border-left: 5px solid var(--success); background: #f0fff4; }
    
    .date-info { display: flex; flex-direction: column; width: 60px; }
    .day-text { font-size: 18px; font-weight: bold; }
    .week-text { font-size: 12px; color: var(--gray); }
    .is-weekend { color: var(--danger); }

    /* 按鈕風格 */
    .btn { padding: 8px 15px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; }
    .btn-blue { background: var(--primary); color: white; }
    .btn-red { background: var(--danger); color: white; }
    .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: white; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 13px; }
    th { background: #f1f1f1; }
  </style>
</head>
<body>
  <div id="loading" style="text-align:center; margin-top:50px;">系統初始化中...</div>

  <!-- 1.基本設定 -->
  <div id="settingPage" class="container hidden">
    <h2>👋 初次見面</h2>
    <p>請設定您的姓名與班別</p>
    <input type="text" id="inputName" placeholder="請輸入姓名" style="width:90%; padding:10px; margin-bottom:15px;">
    <div style="margin-bottom:20px;">
      <label><input type="radio" name="inputShift" value="白班" checked> 白班</label>
      <label style="margin-left:20px;"><input type="radio" name="inputShift" value="晚班"> 晚班</label>
    </div>
    <button class="btn btn-blue" onclick="saveUser()" style="width:100%; padding:12px;">儲存</button>
  </div>

  <!-- 2.排班登記 -->
  <div id="applyPage" class="hidden">
    <div class="container">
        <h3 id="monthLabel" style="margin:0; text-align:center; color: var(--primary);"></h3>
        <p id="statusHint" style="font-size:12px; text-align:center; color:var(--gray);"></p>
        <div id="calendarList" class="calendar-list"></div>
    </div>
    
    <div id="batchBar" class="hidden" style="position:fixed; bottom:60px; left:0; width:100%; background:rgba(0,0,0,0.85); color:white; padding:12px; text-align:center; display:flex; justify-content:space-around; align-items:center;">
      <span id="selectedCount"></span>
      <button class="btn btn-blue" onclick="submitBatch()">確認提交登記</button>
    </div>
  </div>

  <!-- 3.班表查詢 -->
  <div id="queryPage" class="container hidden">
    <h3 id="queryTitle">班表查詢</h3>
    <select id="queryYM" onchange="fetchAllShifts()" style="width:100%; padding:10px; margin-bottom:15px; border-radius:6px;"></select>
    <table>
      <thead><tr><th>日期</th><th>白班</th><th>晚班</th></tr></thead>
      <tbody id="shiftTableBody"></tbody>
    </table>
  </div>

  <nav id="mainNav" class="hidden">
    <button id="btn-apply" onclick="showPage('apply')">📅 排班登記</button>
    <button id="btn-query" onclick="showPage('query')">🔍 班表查詢</button>
  </nav>

<script>
  const LIFF_ID = '2009203505-YoXdzhWv'; 
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxdP936FOYc0ccKaj9xUgTk23idCtlQ8gigIB3Ux2ZTR9mNwRx3AEadi0VzVqdMwhSnZQ/exec';
  
  let userProfile, userRole, userName, userShift;
  let tYear, tMonth, holidayList = [], counts = {}, myDates = [], selectedDates = [];
  const weekMap = ['日', '一', '二', '三', '四', '五', '六'];

  // 0. 初始化
  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();

      // 0-1. 依照 lineId 檢查是否建檔
      const res = await fetch(`${GAS_URL}?action=get_user&lineId=${userProfile.userId}`);
      const data = await res.json();
      
      if (data.exists) {
        userName = data.name;
        userShift = data.shift;
        userRole = data.role;
        // 1. 切換到 2.登記排班
        showPage('apply');
      } else {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('settingPage').classList.remove('hidden');
      }
    } catch (err) {
      alert("初始化失敗: " + err);
    }
  }

  // 1. 切換到 1.基本設定 或 2.登記排班 或 3.班表查詢
  async function showPage(p) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('mainNav').classList.remove('hidden');
    
    // UI 切換
    ['settingPage', 'applyPage', 'queryPage'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(p + 'Page').classList.remove('hidden');
    
    // Tab 高亮
    document.getElementById('btn-apply').className = (p==='apply'?'active':'');
    document.getElementById('btn-query').className = (p==='query'?'active':'');

    if (p === 'apply') await refreshApplyData();
    if (p === 'query') { setupQueryOptions(); await fetchAllShifts(); }
  }

  // 2. 排班頁面邏輯
  async function refreshApplyData() {
    const hint = document.getElementById('statusHint');
    hint.innerText = "正在同步雲端名額...";
    
    try {
      const res = await fetch(`${GAS_URL}?action=init&lineId=${userProfile.userId}`);
      const data = await res.json();
      
      // 處理伺服器回傳的目標年月
      const [y, m] = data.serverTime.split(' ')[0].split('/'); // 暫用 serverTime 輔助或從後端直接給 lockYM
      // 實際上 init 會回傳 counts 的 Key 就是目標年月，我們從中提取
      const firstDate = Object.keys(data.counts)[0];
      const dParts = firstDate.split('/');
      tYear = parseInt(dParts[0]);
      tMonth = parseInt(dParts[1]);

      document.getElementById('monthLabel').innerText = `${tYear}年 ${tMonth}月 排班登記`;
      counts = data.counts;
      myDates = data.myDates;
      holidayList = data.holidayList;

      renderCalendar();
      hint.innerText = "✅ 名額已更新";
    } catch (e) {
      hint.innerText = "❌ 讀取失敗，請重新整理";
    }
  }

  function renderCalendar() {
    const list = document.getElementById('calendarList');
    list.innerHTML = '';
    const daysInMonth = new Date(tYear, tMonth, 0).getDate();

    for(let i=1; i<=daysInMonth; i++) {
        let dStr = `${tYear}/${String(tMonth).padStart(2,'0')}/${String(i).padStart(2,'0')}`;
        if (!counts.hasOwnProperty(dStr)) continue; // 只顯示工作日

        const currentCount = counts[dStr] || 0;
        const remains = 6 - currentCount;
        const isMine = myDates.includes(dStr);
        const isFull = remains <= 0;
        const isSelected = selectedDates.includes(dStr);
        
        const dObj = new Date(tYear, tMonth - 1, i);
        const dayOfWeek = dObj.getDay();
        const isRed = (dayOfWeek === 0 || dayOfWeek === 6 || holidayList.includes(dStr));

        const card = document.createElement('div');
        card.className = `card ${isMine ? 'mine' : ''} ${isSelected ? 'selected' : ''}`;

        card.innerHTML = `
            <div class="date-info">
                <span class="day-text">${i}</span>
                <span class="week-text ${isRed ? 'is-weekend' : ''}">週${weekMap[dayOfWeek]}</span>
            </div>
            <div style="flex:1; margin-left:15px; font-size:13px;">
                ${isMine ? '<b style="color:var(--success)">● 您已登記</b>' : (isFull ? '<span style="color:var(--danger)">❌ 已額滿</span>' : `剩餘 ${remains} 名額`)}
            </div>
            <div>
                ${isMine 
                  ? `<button class="btn btn-red" onclick="cancelDate('${dStr}')">取消</button>`
                  : `<button class="btn ${isSelected?'btn-outline':'btn-blue'}" 
                             onclick="toggleSelect('${dStr}')" 
                             ${isFull && !isSelected ? 'disabled' : ''}>
                             ${isSelected?'取消選取':'選取'}
                    </button>`
                }
            </div>
        `;
        list.appendChild(card);
    }
  }

  function toggleSelect(dStr) {
    const idx = selectedDates.indexOf(dStr);
    if (idx > -1) selectedDates.splice(idx, 1);
    else selectedDates.push(dStr);

    const bar = document.getElementById('batchBar');
    if (selectedDates.length > 0) {
      bar.classList.remove('hidden');
      document.getElementById('selectedCount').innerText = `已選擇 ${selectedDates.length} 天`;
    } else {
      bar.classList.add('hidden');
    }
    renderCalendar();
  }

  async function submitBatch() {
    if (!confirm("確定要提交這些日期的排班嗎？")) return;
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'batch_add', lineId: userProfile.userId, dates: selectedDates })
    });
    const result = await res.json();
    if (result.result === 'ok') {
      alert("登記成功！");
      selectedDates = [];
      document.getElementById('batchBar').classList.add('hidden');
      await refreshApplyData();
    }
  }

  async function cancelDate(dStr) {
    if (!confirm(`確定取消 ${dStr} 的排班？`)) return;
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'cancel', lineId: userProfile.userId, date: dStr })
    });
    await refreshApplyData();
  }

  // 2. 查詢頁面邏輯
  function setupQueryOptions() {
    const sel = document.getElementById('queryYM');
    if (sel.options.length > 0) return;
    const now = new Date();
    for(let i=-1; i<=1; i++) {
      let d = new Date(now.getFullYear(), now.getMonth() + i, 1);
      let val = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
      sel.add(new Option(`${d.getFullYear()}年 ${d.getMonth()+1}月`, val));
    }
    sel.value = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}`;
  }

  async function fetchAllShifts() {
    const ym = document.getElementById('queryYM').value;
    const res = await fetch(`${GAS_URL}?action=get_all_shifts&lineId=${userProfile.userId}&ym=${ym}`);
    const data = await res.json();
    
    // 管理員可切換月份，員工鎖定顯示內容
    document.getElementById('queryYM').style.display = (data.role === 'admin' ? 'block' : 'none');
    document.getElementById('queryTitle').innerText = (data.role === 'admin' ? '全部班表' : '班表查詢');

    const tbody = document.getElementById('shiftTableBody');
    tbody.innerHTML = data.allShifts.length ? '' : '<tr><td colspan="3">尚無資料</td></tr>';
    
    // 簡單排序日期
    data.allShifts.sort((a,b) => a.date.localeCompare(b.date));
    
    data.allShifts.forEach(item => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${item.date.split('/')[2]}日</td>
        <td>${item.shift === '白班' ? item.name : ''}</td>
        <td>${item.shift === '晚班' ? item.name : ''}</td>
      `;
      tbody.appendChild(row);
    });
  }

  // 3. 基本設定
  async function saveUser() {
    const name = document.getElementById('inputName').value.trim();
    const shift = document.querySelector('input[name="inputShift"]:checked').value;
    if (!name) { alert("請輸入姓名"); return; }

    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'save_user',
        lineId: userProfile.userId,
        lineName: userProfile.displayName,
        name: name,
        shift: shift
      })
    });
    const result = await res.json();
    if (result.result === 'ok') {
      userName = name;
      userShift = shift;
      showPage('apply');
    } else {
      alert(result.message);
    }
  }

  init();
</script>
</body>
</html>
